services:
  postgres:
    image: postgres:16-alpine
    container_name: lipwa-blockchain-postgres
    environment:
      POSTGRES_DB: lipwa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lipwa"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - blockchain_pg_data:/var/lib/postgresql/data

  oracle:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    container_name: lipwa-blockchain-oracle
    env_file:
      - ./oracle/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lipwa
      CONTRACT_WASM_PATH: /contracts/inventory_credit/target/wasm32v1-none/release/inventory_credit.wasm
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./contracts:/contracts:ro
    restart: unless-stopped

volumes:
  blockchain_pg_data:
